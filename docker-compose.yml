services:
  db:
    image: postgres:16-alpine
    container_name: electroges_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-electroges}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-electroges_dev}
      POSTGRES_DB: ${POSTGRES_DB:-electroges}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-electroges}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: electroges_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-electroges}:${POSTGRES_PASSWORD:-electroges_dev}@db:5432/${POSTGRES_DB:-electroges}
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production_please}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: electroges_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    command: npm run dev -- --host

volumes:
  postgres_data:
