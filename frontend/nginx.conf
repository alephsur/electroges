server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API and uploads to the backend service.
    # BACKEND_URL is injected at container start via envsubst.
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_http_version 1.1;

        # Required for HTTPS upstreams: sends the correct SNI hostname.
        proxy_ssl_server_name on;

        # Use the upstream hostname in Host, not the browser's original host.
        # Railway routes requests by Host header, so this must match the backend domain.
        proxy_set_header Host $proxy_host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward cookies in both directions without modification.
        proxy_pass_header Set-Cookie;
        proxy_set_header Cookie $http_cookie;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    location /uploads/ {
        proxy_pass ${BACKEND_URL}/uploads/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
    }

    location /health {
        proxy_pass ${BACKEND_URL}/health;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
    }

    # Serve the React SPA for all other paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
